name: publish-latest-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          gh release delete latest --yes --cleanup-tag || true
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f latest
          git push -f origin latest
          gh release create latest \
            guardd-linux-amd64.tar.gz \
            guardd-center-linux-amd64.tar.gz \
            install.sh \
            SHA256SUMS \
            使用说明.txt \
            --title "guardd-suite latest" \
            --notes "公开下载发布包。安装命令：curl -fsSL https://github.com/1227cwx/tsycdn-guardd-release/releases/latest/download/install.sh | bash"
